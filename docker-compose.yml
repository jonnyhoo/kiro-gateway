services:
  kiro-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kiro-gateway
    ports:
      - "${KIRO_GATEWAY_PORT_BIND:-8000:8000}"
    environment:
      # Server configuration
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000

      # Required: Set your proxy API key
      # You can also use .env file (see env_file below)
      - PROXY_API_KEY=${PROXY_API_KEY:-my-super-secret-password-123}

      # Authentication (choose one method)
      # Option 1: Refresh token
      - REFRESH_TOKEN=${REFRESH_TOKEN:-}

      # Option 2: Profile ARN (optional, for Kiro IDE)
      - PROFILE_ARN=${PROFILE_ARN:-}

      # Option 3: Credentials file path (mounted as volume below)
      - KIRO_CREDS_FILE=${KIRO_CREDS_FILE:-}

      # Option 4: kiro-cli SQLite database (mounted as volume below)
      - KIRO_CLI_DB_FILE=${KIRO_CLI_DB_FILE:-}

      # Optional settings
      - KIRO_REGION=${KIRO_REGION:-us-east-1}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG_MODE=${DEBUG_MODE:-off}
      - DEBUG_DIR=${DEBUG_DIR-/app/runtime/debug_logs}
      - RESPONSE_CACHE_REDIS_URL=${RESPONSE_CACHE_REDIS_URL:-redis://redis:6379/0}
      - RESPONSE_CACHE_TTL_SECONDS=${RESPONSE_CACHE_TTL_SECONDS:-300}
      - RESPONSE_CACHE_KEY_PREFIX=${RESPONSE_CACHE_KEY_PREFIX:-kiro-gateway:response-cache}
      - PROMPT_CACHE_REDIS_URL=${PROMPT_CACHE_REDIS_URL:-redis://redis:6379/0}
      - PROMPT_CACHE_KEY_PREFIX=${PROMPT_CACHE_KEY_PREFIX:-kiro-gateway:prompt-cache}
      - TOOL_RESULT_CACHE_TTL_SECONDS=${TOOL_RESULT_CACHE_TTL_SECONDS:-300}
      - TOOL_RESULT_CACHE_KEY_PREFIX=${TOOL_RESULT_CACHE_KEY_PREFIX:-kiro-gateway:tool-result-cache}
      - KIRO_USAGE_ACCOUNTS_FILE=${KIRO_USAGE_ACCOUNTS_FILE-/app/runtime/usage-accounts.json}

      # VPN/Proxy settings (for restricted networks)
      - VPN_PROXY_URL=${VPN_PROXY_URL:-}

    # Alternative: Load all variables from .env file
    env_file:
      - .env

    volumes:
      # Runtime data lives outside the tracked worktree by default.
      - ${KIRO_GATEWAY_RUNTIME_DIR:-./runtime}:/app/runtime

      # Mount AWS SSO cache directory. The default path is an empty tracked
      # directory so compose stays valid even when credentials are not mounted.
      - ${KIRO_GATEWAY_SSO_CACHE_DIR:-./deploy/empty-sso-cache}:/home/kiro/.aws/sso/cache:ro

    restart: unless-stopped

    depends_on:
      redis:
        condition: service_healthy

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

    # Resource limits (recommended for production)
    # Adjust based on your workload and available resources
    deploy:
      resources:
        limits:
          cpus: '2'        # Maximum CPU cores (streaming can be CPU-intensive)
          memory: 1G       # Maximum memory (sufficient for FastAPI + streaming)
        reservations:
          cpus: '0.5'      # Minimum guaranteed CPU
          memory: 256M     # Minimum guaranteed memory

  redis:
    image: redis:8-alpine
    container_name: kiro-gateway-redis
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - ${KIRO_GATEWAY_REDIS_DATA_DIR:-./runtime/redis}:/data

networks:
  default:
    name: kiro-gateway-network
